<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 18 18">
  <rect width="18" height="18" fill="#eef0f6"/>
  <!-- coin stack 1 (short, left) -->
  <g fill="#5b7ddb" stroke="#1b2a4e" stroke-width="0.4">
    <ellipse cx="4.2" cy="14.6" rx="1.7" ry="0.5"/>
    <rect x="2.5" y="13.5" width="3.4" height="1.1"/>
    <ellipse cx="4.2" cy="13.5" rx="1.7" ry="0.5"/>
    <rect x="2.5" y="12.4" width="3.4" height="1.1"/>
    <ellipse cx="4.2" cy="12.4" rx="1.7" ry="0.5"/>
  </g>
  <!-- coin stack 2 (medium, center) -->
  <g fill="#5b7ddb" stroke="#1b2a4e" stroke-width="0.4">
    <ellipse cx="9" cy="14.6" rx="1.7" ry="0.5"/>
    <rect x="7.3" y="13.5" width="3.4" height="1.1"/>
    <ellipse cx="9" cy="13.5" rx="1.7" ry="0.5"/>
    <rect x="7.3" y="12.4" width="3.4" height="1.1"/>
    <ellipse cx="9" cy="12.4" rx="1.7" ry="0.5"/>
    <rect x="7.3" y="11.3" width="3.4" height="1.1"/>
    <ellipse cx="9" cy="11.3" rx="1.7" ry="0.5"/>
    <rect x="7.3" y="10.2" width="3.4" height="1.1"/>
    <ellipse cx="9" cy="10.2" rx="1.7" ry="0.5"/>
  </g>
  <!-- coin stack 3 (tall, right) -->
  <g fill="#5b7ddb" stroke="#1b2a4e" stroke-width="0.4">
    <ellipse cx="13.8" cy="14.6" rx="1.7" ry="0.5"/>
    <rect x="12.1" y="13.5" width="3.4" height="1.1"/>
    <ellipse cx="13.8" cy="13.5" rx="1.7" ry="0.5"/>
    <rect x="12.1" y="12.4" width="3.4" height="1.1"/>
    <ellipse cx="13.8" cy="12.4" rx="1.7" ry="0.5"/>
    <rect x="12.1" y="11.3" width="3.4" height="1.1"/>
    <ellipse cx="13.8" cy="11.3" rx="1.7" ry="0.5"/>
    <rect x="12.1" y="10.2" width="3.4" height="1.1"/>
    <ellipse cx="13.8" cy="10.2" rx="1.7" ry="0.5"/>
    <rect x="12.1" y="9.1" width="3.4" height="1.1"/>
    <ellipse cx="13.8" cy="9.1" rx="1.7" ry="0.5"/>
    <rect x="12.1" y="8" width="3.4" height="1.1"/>
    <ellipse cx="13.8" cy="8" rx="1.7" ry="0.5"/>
  </g>
  <!-- growth arrow -->
  <path d="M 3 8.5 L 8.5 5.5 L 14 2.5" stroke="#1b2a4e" stroke-width="0.9" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
  <path d="M 11.5 2.5 L 14 2.5 L 14 5" stroke="#1b2a4e" stroke-width="0.9" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
